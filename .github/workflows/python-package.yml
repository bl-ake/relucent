# See: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Usable

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: "0 0 1 * *"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install ".[dev,torch]"
    - name: Lint with ruff
      run: ruff check .
    - name: Check formatting with ruff
      run: ruff format --check .
    - name: Type-check with basedpyright
      run: basedpyright

  test:
    name: Test (with torch) - ${{ matrix.os }} py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }} (${{ matrix.os }})
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install ".[dev,torch]"
    - name: Test with pytest
      run: pytest

  test-no-torch:
    name: Test (no torch) - ubuntu py3.13
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"
    - name: Install dependencies (without torch extra)
      run: |
        python -m pip install --upgrade pip
        python -m pip install ".[dev]"
    - name: Verify torch is not installed
      run: |
        python - <<'PY'
        import importlib.util
        if importlib.util.find_spec("torch") is not None:
            raise SystemExit("Expected no-torch environment, but torch is installed.")
        print("torch not installed: OK")
        PY
    - name: Run no-torch compatibility checks
      run: pytest tests/test_no_torch.py
